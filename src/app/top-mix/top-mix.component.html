<div class="table-container">
  <div class="table-top-panel">
    <mat-form-field>
      <mat-label>Filter by Name</mat-label>
      <input matInput (keyup)="applyFilter($event)" #input>
    </mat-form-field>
<!--    <button class="button" mat-flat-button (click)="onCreate()">Create</button>-->
  </div>
  <div class="example-container mat-elevation-z8">
    <mat-progress-bar *ngIf="isLoadingResults" mode="query"></mat-progress-bar>
    <div class="example-table-container">
      <table mat-table [dataSource]="dataSource" matSort matSortActive="name" matSortDisableClear matSortDirection="asc">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let row" (click)="notAdminView(row.id)"> {{row.name}} </td>
        </ng-container>
        <ng-container matColumnDef="rating">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Rating</th>
          <td mat-cell *matCellDef="let row" (click)="notAdminView(row.id)">
            <div class="rating-container">
              <star-rating
                [showHalfStars]="true"
                [starType]="'svg'"
                [rating]="row.rating"
                [readOnly]="true">
              </star-rating>{{row.rating | number:'1.1-2'}}
            </div>
          </td>
        </ng-container>
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Дія</th>
          <td mat-cell *matCellDef="let row">
            <mat-icon class="icon view" aria-hidden="false" fontIcon="pageview" (click)="onView(row.id)"></mat-icon>
            <mat-icon class="icon edit" aria-hidden="false" fontIcon="settings"></mat-icon>
            <mat-icon class="icon red-color" fontIcon="delete"></mat-icon>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
        </tr>
      </table>
    </div>
    <mat-paginator
      (page)="handlePageEvent($event)"
      [length]="totalRows"
      [pageIndex]="currentPage"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      aria-label="Select page">
    </mat-paginator>
  </div>
</div>
