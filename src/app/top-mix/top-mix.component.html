<div class="table-container">
  <div class="table-top-panel">
    <label class="filter-field">
      <span>Filter by Name</span>
      <input type="text" (input)="applyFilter($event)" #input>
    </label>
  </div>
  <div class="example-container">
    <div *ngIf="isLoadingResults" class="loading-line"></div>
    <div class="example-table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Rating</th>
            <th *ngIf="user?.isAdmin">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of mixes" (click)="notAdminView(row.id)">
            <td>{{ row.name }}</td>
            <td>
              <div class="rating-container">
                <star-rating
                  [showHalfStars]="true"
                  [starType]="'svg'"
                  [rating]="row.rating"
                  [readOnly]="true">
                </star-rating>
                {{ row.rating | number:'1.1-2' }}
              </div>
            </td>
            <td *ngIf="user?.isAdmin">
              <div class="table-action-container">
                <button type="button" class="icon-btn" (click)="onView(row.id); $event.stopPropagation()">View</button>
              </div>
            </td>
          </tr>
          <tr *ngIf="!mixes.length && !isLoadingResults">
            <td [attr.colspan]="user?.isAdmin ? 3 : 2">No data matching the filter "{{input.value}}"</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="pagination">
    <button type="button" (click)="prevPage()" [disabled]="currentPage === 0">Prev</button>
    <span>Page {{ currentPage + 1 }}</span>
    <button type="button" (click)="nextPage()" [disabled]="(currentPage + 1) * pageSize >= totalRows">Next</button>
    <label>
      <span>Rows</span>
      <select [value]="pageSize" (change)="setPageSize($any($event.target).value)">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
      </select>
    </label>
  </div>
</div>
