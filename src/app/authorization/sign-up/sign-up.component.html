<div class="popup-container">
  <h1 mat-dialog-title>Реєстрація</h1>
  <form [formGroup]="createSignUpForm" class="example-form">
    <div class="create-account-container">
      <div class="side">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Імʼя</mat-label>
          <input matInput formControlName="firstName">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Пізвище</mat-label>
          <input matInput formControlName="lastName">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Пароль</mat-label>
          <input matInput formControlName="password">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Повторіть пароль</mat-label>
          <input matInput formControlName="confirmPassword">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Роль</mat-label>
          <mat-select formControlName="role">
            <mat-option *ngFor="let role of roles" [value]="role.value">
              {{role.viewValue}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
  </form>
  <div mat-dialog-actions class="popup-action-container">
    <button class="button popup-actions-button create-color" mat-flat-button (click)="onSave()">Створити</button>
    <button class="button popup-actions-button cancel-color" mat-flat-button (click)="onCancel()">Cкасувати</button>
  </div>
</div>
