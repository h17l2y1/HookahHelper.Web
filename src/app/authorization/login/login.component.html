<div class="popup-container">
  <div class="user-data">
    <div class="user-pictures"></div>
  </div>
  <form [formGroup]="createLoginForm" class="example-form" *ngIf="createLoginForm">
    <div class="create-account-container">
      <div class="side">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Email</mat-label>
          <mat-icon matTextPrefix class="input-icon">mail</mat-icon>
          <input matInput
                 type="email"
                 (change)="fixAutoFill($event, pwd.value)"
                 placeholder="Ex. pat@example.com"
                 formControlName="email"
                 name="username"
                 required>
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Пароль</mat-label>
          <mat-icon matTextPrefix class="input-icon">lock</mat-icon>
          <input matInput #pwd
                 placeholder="Password"
                 formControlName="password"
                 type="password"
                 name="password"
                 required>
        </mat-form-field>
      </div>
    </div>
  </form>
  <button class="button popup-actions-button purple-background-color" mat-flat-button (click)="onSave()">Login</button>
</div>
