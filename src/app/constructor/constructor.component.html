<div class="ctor-main">
  <div class="example-container2">
    <form [formGroup]="constructorForm" class="example-full-width">
      <div class="button-container">
        <label class="field">
          <span>Name</span>
          <input type="text" formControlName="name" placeholder="Mix Name">
        </label>
        <button class="button" type="button" (click)="onSave()">Create</button>
        <button class="button push" type="button" (click)="onReset()">Reset</button>
      </div>
      <div cdkDropList
           #doneList="cdkDropList"
           [cdkDropListData]="selectedTobaccos"
           [cdkDropListConnectedTo]="[todoList]"
           class="example-list2"
           (cdkDropListDropped)="drop($event)"
           formArrayName="tobaccoMixes">
        <div class="card-wrapper" *ngFor="let tobacco of getTobaccoMix.controls; let i=index">
          <button type="button" class="demo-section badge" (click)="onRemove(tobacco.value, i)">delete</button>
          <div class="tobacco-card">
            <img class="brand-card-image" [src]="tobacco.value.imageLink" alt="image error">
            <div [formGroupName]="i" class="tobacco-card-content">
              <div class="title">{{ tobacco.value.tobaccoName }}</div>
              <label class="field">
                <span>Percent</span>
                <input type="number" formControlName="percent" placeholder="Percent">
                <span class="error" *ngIf="tobacco.invalid">TOTAL MORE 100</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="chart" *ngIf="getTobaccoMix.controls.length">
      <ngx-charts-advanced-pie-chart
        [results]="chartData"
        [gradient]="true" >
      </ngx-charts-advanced-pie-chart>
    </div>
  </div>

  <div class="example-container">
    <label class="field">
      <span>Brand</span>
      <select [formControl]="brandControl">
        <option value="">Select brand</option>
        <option *ngFor="let option of allBrandsOption" [value]="option.id">{{ option.name }}</option>
      </select>
    </label>
    <h2>Tobaccos</h2>
    <div class="my_scroll_div">
      <div
        cdkDropList
        #todoList="cdkDropList"
        [cdkDropListData]="tobaccos"
        [cdkDropListConnectedTo]="[doneList]"
        class="example-list"
        (cdkDropListDropped)="drop($event)">
        <div class="example-box" *ngFor="let item of tobaccos" cdkDrag>
          {{item.name}}
          <img class="my-preview" *cdkDragPreview [src]="item.image.link" [alt]="item.name">
        </div>
      </div>
    </div>
  </div>
</div>
