<div class="popup-container">
  <h1 mat-dialog-title class="title">Create Brand</h1>
  <form [formGroup]="createBrandForm" class="example-form">
    <div class="create-tobacco-container">
      <div class="side">
        <app-image-upload [aspectRatio]="aspectRatio"></app-image-upload>
      </div>
      <div class="side">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Brand Name</mat-label>
          <input matInput formControlName="name" (keyup)="onChange()">
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Country</mat-label>
          <mat-select formControlName="countryId">
            @for (item of countries$ | async; track item) {
              <mat-option [value]="item.id">
                {{item.name}}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description"></textarea>
        </mat-form-field>
      </div>
      <div class="side">
        <button class="button add-line-btn example-full-width purple-background-color" mat-flat-button (click)="addLine()">Add line</button>
        <div formArrayName="lines">
          @for (line of getLines.controls; track line; let i = $index) {
            <div class="brand-line-container">
              <div [formGroupName]="i" class="inp-brand-line">
                <mat-form-field class="example-full-width" appearance="fill">
                  <mat-label>Line Name</mat-label>
                  <input formControlName="name" matInput (keyup)="onChange()">
                </mat-form-field>
                <br>
                </div>
                <button mat-mini-fab color="warn" class="w-100 btn-remove" (click)="onRemove(i)">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            }
          </div>
        </div>
      </div>
    </form>
    <div class="popup-action-container">
      <button class="popup-btn create-btn-color" (click)="onSave()">Create</button>
      <button class="popup-btn cancel-btn-color" (click)="onCancel()">Cancel</button>
    </div>
  </div>
