<div class="example-container mat-elevation-z8">

  <div class="example-table-container">

    <table mat-table [dataSource]="data" class="example-table" matSort matSortActive="created" matSortDisableClear matSortDirection="desc">
<!--      <ng-container matColumnDef="image">-->
<!--        <th mat-header-cell *matHeaderCellDef>Лого</th>-->
<!--        <td mat-cell *matCellDef="let row" (click)="onBrandList(row.id)">-->
<!--          <img class="brand-card-image" src="{{row.image?.link}}" alt="image"></td>-->
<!--      </ng-container>-->

      <ng-container matColumnDef="number">
        <th mat-header-cell *matHeaderCellDef>name</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>updatedAt</th>
        <td mat-cell *matCellDef="let row">{{ row.updatedAt }}</td>
      </ng-container>

      <!-- State Column -->
      <ng-container matColumnDef="state">
        <th mat-header-cell *matHeaderCellDef>text2</th>
        <td mat-cell *matCellDef="let row">{{ row.text }}</td>
      </ng-container>

      <!-- Created Column -->
      <ng-container matColumnDef="created">
        <th mat-header-cell *matHeaderCellDef mat-sort-header disableClear>Created</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <mat-paginator [length]="resultsLength" [pageSize]="30"
                 aria-label="Select page of GitHub search results"></mat-paginator>
</div>
