<button type="button" class="theme-switch" [class.light]="checked" (click)="toggleTheme()">
  <span class="theme-switch-label dark">Dark</span>
  <span class="theme-switch-track" aria-hidden="true">
    <span class="theme-switch-thumb"></span>
  </span>
  <span class="theme-switch-label light">Light</span>
</button>
