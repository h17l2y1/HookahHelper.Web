<div class="theme-picker">
  <button class="theme-trigger" type="button" (click)="toggle()">
    <span class="material-icons-outlined">palette</span>
  </button>

  @if (isOpen) {
    <div class="theme-menu">
      @for (option of options; track option.value) {
        <button class="theme-option" type="button" (click)="changeTheme(option?.value)">
          <span class="theme-preview">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" aria-hidden="true">
              <path
                d="M77.87 0C79.05 0 80 .95 80 2.13v75.74c0 1.17-.95 2.13-2.13 2.13H2.13C.96 80 0 79.04 0 77.87V2.13C0 .95.96 0 2.13 0h75.74z"
                [attr.fill]="option?.backgroundColor"></path>
              <path
                d="M54 40c3.32 0 6 2.69 6 6 0 1.2 0-1.2 0 0 0 3.31-2.68 6-6 6H26c-3.31 0-6-2.69-6-6 0-1.2 0 1.2 0 0 0-3.31 2.69-6 6-6h28z"
                [attr.fill]="option?.buttonColor"></path>
              <path d="M0 0h80v17.24H0V0z" [attr.fill]="option?.headingColor"></path>
            </svg>
          </span>
          <span>{{ option?.label }}</span>
        </button>
      }
    </div>
  }
</div>
