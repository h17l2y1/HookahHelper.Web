<div class=flex>
  <div class=header>
    <mat-toolbar color="primary" class="mat-toolbar">
      <span>HookahHub</span>
      <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="tabs">
        <a class="tab" mat-tab-link routerLink="/brand" routerLinkActive="active-link">Бренди</a>
        <a class="tab" mat-tab-link routerLink="/tobacco" routerLinkActive="active-link">Табаки</a>
        <a class="tab" mat-tab-link routerLink="/tag" routerLinkActive="active-link" *ngIf="role === 'admin'">Теги</a>
        <a class="tab" mat-tab-link routerLink="/constructor" routerLinkActive="active-link">Конструктор</a>
        <a class="tab" mat-tab-link routerLink="/mixes" routerLinkActive="active-link">Топ мiкси</a>
      </nav>
      <span class="toolbar-item-spacer"></span>
      <button mat-icon-button matTooltip="Like">
        <mat-icon>favorite</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Notifications">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-icon-button matTooltip="My Account" [matMenuTriggerFor]="userAccountMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userAccountMenu [overlapTrigger]="false" yPosition="below">
        <button mat-menu-item (click)="signUp()">
          <mat-icon>person</mat-icon>
          <span>Sign In</span>
        </button>
        <button mat-menu-item (click)="login()">
          <mat-icon>person</mat-icon>
          <span>Login</span>
        </button>
        <button mat-menu-item routerLink="#">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <button mat-menu-item routerLink="#">
          <mat-icon>help</mat-icon>
          <span>Help</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          Logout
        </button>
      </mat-menu>
    </mat-toolbar>
  </div>
  <div class=h100>
    <div class="main-container">
      <mat-tab-nav-panel #tabPanel>
        <router-outlet></router-outlet>
      </mat-tab-nav-panel>
    </div>
  </div>
  <div class=footer></div>
</div>
