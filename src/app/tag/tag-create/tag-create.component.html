<div class="tag-modal-shell">
  <div class="tag-modal-header">
    <div class="tag-modal-kicker">Tags</div>
    <h1 class="tag-modal-title">Create tag</h1>
    <p class="tag-modal-subtitle">
      Add a new tag, choose its color and decide whether it should be global.
    </p>
  </div>

  <div class="tag-modal-grid">
    <section class="tag-form-card">
      <form [formGroup]="createTagForm" class="tag-form">
        <label class="tag-field">
          <span class="tag-field-label">Name</span>
          <input type="text" formControlName="name" (keyup)="onChange()" placeholder="For example: Capuccino">
        </label>

        <label class="tag-field tag-toggle-row">
          <input type="checkbox" formControlName="isGlobal">
          <div>
            <span class="tag-field-label">Visibility</span>
            <span class="tag-field-hint">Global tags are available everywhere</span>
          </div>
        </label>

        <label class="tag-field">
          <span class="tag-field-label">Color</span>
          <div class="color-row">
            <input type="color" [ngModel]="color" (ngModelChange)="onColorChange($event)" [ngModelOptions]="{standalone: true}">
            <input class="color-code" type="text" [value]="color" readonly>
          </div>
        </label>
      </form>
    </section>

    <aside class="tag-preview-card">
      <div class="preview-head">
        <span class="preview-title">Preview</span>
        <span class="preview-pill">Live</span>
      </div>

      <div class="preview-body">
        <app-tag [name]="nameControl.value" [color]="color" [type]="TagType.Bordered"></app-tag>
        <div class="preview-meta">
          <span class="preview-label">One tag preview only</span>
          <span class="preview-value">{{ color }}</span>
        </div>
      </div>
    </aside>
  </div>

  <div class="tag-modal-footer">
    <button class="popup-btn create-btn-color" type="button" (click)="onSave()">Create</button>
    <button class="popup-btn create-btn-color secondary" type="button" (click)="onSave(true)">Create More</button>
    <button class="popup-btn cancel-btn-color" type="button" (click)="onCancel()">Cancel</button>
  </div>
</div>
