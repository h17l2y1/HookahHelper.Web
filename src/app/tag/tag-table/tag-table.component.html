<div class="table-container">
  <div class="table-top-panel">
    <label class="filter-input">
      <span>Filter by Name</span>
      <input type="text" (keyup)="applyFilter($event)" #input>
    </label>
    <button class="button btn-purple-grad" type="button" (click)="onCreate()">Create</button>
  </div>
  <div class="example-container">
    @if (isLoadingResults) {
      <div class="loading-bar"></div>
    }
    <div class="example-table-container">
      <table class="data-table">
        <thead>
        <tr>
          <th>Name</th>
          <th>Tag</th>
          <th>Global</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        @for (row of tags; track row.id) {
          <tr>
            <td>{{ row.name }}</td>
            <td>
              <div class="tag-container">
                <app-tag [name]="row.name" [color]="row.color" [type]="TagType.Bordered"></app-tag>
              </div>
            </td>
            <td>
              <input type="checkbox" [disabled]="true" [checked]="row.isGlobal">
            </td>
            <td>
              <div class="table-action-container">
                <lord-icon
                  src="https://cdn.lordicon.com/ifsxxxte.json"
                  trigger="hover"
                  colors="primary:#0A84FF"
                  style="width:25px;height:25px"
                  (click)="onUpdate(row.id)">
                </lord-icon>
                <lord-icon
                  src="https://cdn.lordicon.com/skkahier.json"
                  trigger="hover"
                  colors="primary:#f44336"
                  style="width:25px;height:25px"
                  (click)="onDelete(row.id)">
                </lord-icon>
              </div>
            </td>
          </tr>
        }
        </tbody>
      </table>
    </div>
    <div class="paginator">
      <button type="button" class="pager-btn" [disabled]="currentPage === 0" (click)="handlePageEvent(currentPage - 1)">Prev</button>
      <span>Page {{ currentPage + 1 }}</span>
      <button type="button" class="pager-btn" [disabled]="(currentPage + 1) * pageSize >= totalRows" (click)="handlePageEvent(currentPage + 1)">Next</button>
      <select [value]="pageSize" (change)="pageSize = +($any($event.target).value); currentPage = 0; getTags()">
        @for (option of pageSizeOptions; track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </div>
  </div>
</div>
