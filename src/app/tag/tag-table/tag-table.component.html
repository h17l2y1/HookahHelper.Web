<div class="table-container">
  <div class="table-top-panel">
    <mat-form-field class="filter-input">
      <mat-label>Filter by Name</mat-label>
      <input matInput (keyup)="applyFilter($event)" #input>
    </mat-form-field>
    <button class="button btn-purple-grad" (click)="onCreate()">Create</button>
  </div>
  <div class="example-container mat-elevation-z8">
    <mat-progress-bar *ngIf="isLoadingResults" mode="query"></mat-progress-bar>
    <div class="example-table-container">
      <table mat-table [dataSource]="dataSource" matSort matSortActive="name" matSortDisableClear
             matSortDirection="asc">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let row"> {{row.name}} </td>
        </ng-container>
        <ng-container matColumnDef="tag">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">
            <div class="tag-container">
              <app-tag [name]="row.name" [color]="row.color" [type]="TagType.Bordered"></app-tag>
            </div>
          </td>
        </ng-container>
        <ng-container matColumnDef="isGlobal">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Global</th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox class="example-margin" [disabled]="true" [checked]="row.isGlobal"></mat-checkbox>
          </td>
        </ng-container>
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <div class="table-action-container">
              <lord-icon
                src="https://cdn.lordicon.com/ifsxxxte.json"
                trigger="hover"
                colors="primary:#0A84FF"
                style="width:25px;height:25px"
                (click)="onUpdate(row.id)">
              </lord-icon>
              <lord-icon
                src="https://cdn.lordicon.com/skkahier.json"
                trigger="hover"
                colors="primary:#f44336"
                style="width:25px;height:25px"
                (click)="onDelete(row.id)">
              </lord-icon>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
        </tr>
      </table>
    </div>
    <mat-paginator
      (page)="handlePageEvent($event)"
      [length]="totalRows"
      [pageIndex]="currentPage"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      aria-label="Select page">
    </mat-paginator>
  </div>
</div>
