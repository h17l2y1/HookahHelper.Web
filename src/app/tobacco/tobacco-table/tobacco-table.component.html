<div class="tobacco-container">
  <div class="tobacco-top-panel">
    <button class="button" mat-flat-button (click)="onCreate()">Create</button>
    <form [formGroup]="filterForm" class="example-form">
      <mat-form-field class="filter">
        <mat-label>Filter by Name</mat-label>
        <input matInput formControlName="name">
      </mat-form-field>
      <mat-form-field class="filter">
        <mat-label>Бренд</mat-label>
        <mat-select formControlName="brandId">
          <mat-option>Усi</mat-option>
          <mat-option *ngFor="let option of brands$ | async" [value]="option.id">
            {{option.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="filter">
        <mat-label>Країна</mat-label>
        <mat-select formControlName="countryId">
          <mat-option>Усi</mat-option>
          <mat-option *ngFor="let option of countries$ | async" [value]="option.id">
            {{option.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="filter">
        <mat-label>Лінійка</mat-label>
        <mat-select formControlName="lineId">
          <mat-option *ngFor="let option of linesOption" [value]="option.id">
            {{option.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="filter">
        <mat-label>Важкість</mat-label>
        <mat-select formControlName="heavinessId">
          <mat-option>Усi</mat-option>
          <mat-option *ngFor="let option of heaviness$ | async" [value]="option.id">
            {{option.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </div>

  <section class="example-section">
    <mat-slide-toggle class="example-margin"
      [color]="color"
      [checked]="checked"
      [disabled]="disabled">
      Slide me!
    </mat-slide-toggle>
  </section>

  <app-tobacco-list-table-table *ngIf="tobaccos"
    [tobaccos]="tobaccos">
  </app-tobacco-list-table-table>

  <mat-paginator
    (page)="handlePageEvent($event)"
    [length]="totalRows"
    [pageIndex]="currentPage"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    aria-label="Select page">
  </mat-paginator>
</div>
