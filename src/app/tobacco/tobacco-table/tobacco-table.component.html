<div class="tobacco-container">
  <div class="tobacco-top-panel">
    <mat-form-field>
      <mat-label>Filter by Name</mat-label>
      <input matInput (keyup)="applyFilter($event)" #input>
    </mat-form-field>

    <button class="button" mat-flat-button (click)="openDialog()">Create</button>
  </div>
  <div class="card-container" >
    <mat-card class="tobacco-card"*ngFor="let tobacco of tobaccos">
      <img mat-card-image src="https://material.angular.io/assets/img/examples/shiba2.jpg" alt="Photo of a Shiba Inu">
      <mat-card-content>
        <div class="rating"><span>Rating</span></div>
        <mat-card-title>{{tobacco.name}}</mat-card-title>
        <div class="description">
          <p>
            {{tobacco.description}}
          </p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
  <mat-paginator
    (page)="handlePageEvent($event)"
    [length]="totalRows"
    [pageIndex]="currentPage"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    aria-label="Select page">
  </mat-paginator>
</div>
