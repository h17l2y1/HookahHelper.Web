<div class="table-container">
  <div class="example-container mat-elevation-z8">
    <!--  <div class="example-loading-shade" *ngIf="isLoadingResults">-->
    <!--    <mat-spinner *ngIf="isLoadingResults"></mat-spinner>-->
    <!--  </div>-->
    <div class="example-table-container">
      <table mat-table [dataSource]="tobaccos" matSort matSortActive="name" matSortDisableClear matSortDirection="asc">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID</th>
          <td mat-cell *matCellDef="let row"> {{row.id}} </td>
        </ng-container>
        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef>Лого</th>
          <td mat-cell *matCellDef="let row">
            <img class="image" src="{{row.image?.link}}" alt="image"></td>
        </ng-container>
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Назва</th>
          <td mat-cell *matCellDef="let row"> {{row.name}} </td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Опис</th>
          <td mat-cell *matCellDef="let row"> {{row.description}} </td>
        </ng-container>
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Дія</th>
          <td mat-cell *matCellDef="let row">
            <mat-icon class="icon edit" aria-hidden="false" fontIcon="settings" (click)="onEdit(row.id)"></mat-icon>
            <!--          <mat-icon class="icon delete" fontIcon="delete" (click)="delete(row.id)"></mat-icon>-->
            <mat-icon class="icon delete" fontIcon="delete" (click)="onDelete(row.id)" ></mat-icon>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">No data matching the filter "..."</td>
        </tr>
      </table>
    </div>
  </div>
</div>
