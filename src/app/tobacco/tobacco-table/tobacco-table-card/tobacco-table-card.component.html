<div class="tobacco-container">
  <mat-progress-bar *ngIf="isLoadingResults" mode="query"></mat-progress-bar>
  <div class="card-container">
    <mat-card class="brand-card" *ngFor="let tobacco of tobaccos">
      <a class="image-link" [routerLink]="['/tobaccos/tobacco/', tobacco.id]">
        <img mat-card-image class="image" src="{{tobacco.image.link}}" alt="image error">
      </a>
      <div class="info">
        <div class="title">
          <a class="title-link" [routerLink]="['/tobaccos/tobacco/', tobacco.id]"> {{tobacco.name}}</a>
        </div>
        <div class="description">{{tobacco.description}}</div>
        <div class="rating-container">
          <star-rating
            [showHalfStars]="true"
            [starType]="'svg'"
            [rating]="tobacco.rating"
            [readOnly]="true">
          </star-rating>
          {{ tobacco.rating | number:'1.1-2' }}
        </div>
      </div>
    </mat-card>
  </div>
  <mat-paginator
    (page)="handlePageEvent($event)"
    [length]="totalRows"
    [pageIndex]="currentPage"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    aria-label="Select page">
  </mat-paginator>
</div>
