<div class="tobacco-container">
  <div class="card-container">
    <mat-card class="tobacco-card" *ngFor="let tobacco of tobaccos" (click)="onEdit(tobacco.id)">
      <img mat-card-image class="image" src="{{tobacco.image?.link}}" alt="image error">
      <mat-card-content>
        <mat-card-title class="title">{{tobacco.name}}</mat-card-title>
        <div class="description">
          <p>
            {{tobacco.description}}
          </p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
