<div class="popup-container">
  <h1 mat-dialog-title>Create Tobacco</h1>

  <div class="container" appDnd (fileDropped)="onFilesDropped($event)">
    <input type="file" #fileDropRef id="fileDropRef">
    <div class="file-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="63" height="64" viewBox="0 0 63 64">
        <g fill="#ffffff" fill-rule="nonzero">
          <path
            d="M42.656 15.135a1.953 1.953 0 0 1-1.391-.578L31.5 4.795l-9.765 9.762a1.97 1.97 0 1 1-2.785-2.785L30.106.616a1.97 1.97 0 0 1 2.785 0l11.157 11.156a1.97 1.97 0 0 1-1.392 3.363z"/>
          <path
            d="M31.5 36.791a1.97 1.97 0 0 1-1.969-1.969V2.01a1.97 1.97 0 0 1 3.938 0v32.812a1.97 1.97 0 0 1-1.969 1.969z"/>
          <path
            d="M55.781 63.041H7.22A7.225 7.225 0 0 1 0 55.822V41.385a4.599 4.599 0 0 1 4.594-4.594h7.234a4.567 4.567 0 0 1 4.402 3.276l2.814 9.382a.658.658 0 0 0 .628.467h23.656a.658.658 0 0 0 .628-.467l2.814-9.385a4.572 4.572 0 0 1 4.402-3.273h7.234A4.599 4.599 0 0 1 63 41.385v14.437a7.225 7.225 0 0 1-7.219 7.219zM4.594 40.729a.656.656 0 0 0-.657.656v14.437a3.286 3.286 0 0 0 3.282 3.282H55.78a3.286 3.286 0 0 0 3.282-3.282V41.385a.656.656 0 0 0-.657-.656h-7.234a.65.65 0 0 0-.628.467L47.73 50.58a4.628 4.628 0 0 1-4.402 3.274H19.672a4.567 4.567 0 0 1-4.402-3.276l-2.814-9.382a.65.65 0 0 0-.628-.467H4.594z"/>
        </g>
      </svg>
      <h3>Drag and drop file here</h3>
      <h3>or</h3>
      <button mat-raised-button color="primary" (click)="fileDropRef.click()">Choose File</button>
    </div>
  </div>

  <form [formGroup]="createTobaccoForm" class="example-form">
    <div formArrayName="tobaccos">
      <div *ngFor="let tobacco of getTobaccos.controls; let i=index">
        <div [formGroupName]="i" class="">
          <div class="create-tobacco-container">
            <div class="side">
<!--              <app-image-upload [aspectRatio]="aspectRatio" (files)="getFiles($event)"></app-image-upload>-->
            </div>
            <div class="side">
              <mat-form-field class="example-full-width" appearance="fill">
                <mat-label>Tobacco Name</mat-label>
                <input matInput formControlName="name" (keyup)="onChange()">
              </mat-form-field>
              <mat-form-field class="example-full-width" appearance="fill">
                <mat-label>Brand</mat-label>
                <input type="text" matInput [formControl]="brandControl" [matAutocomplete]="autoBrands">
                <mat-autocomplete #autoBrands="matAutocomplete" [displayWith]="displayFn">
                  <mat-option *ngFor="let option of filteredBrandsOptions" [value]="option">
                    {{option.name}}
                  </mat-option>
                </mat-autocomplete>
              </mat-form-field>
              <mat-form-field class="example-full-width" appearance="fill">
                <mat-label>Heaviness</mat-label>
                <mat-select formControlName="heavinessId">
                  <mat-option *ngFor="let option of heaviness$ | async" [value]="option.id">
                    {{option.name}}
                  </mat-option>
                </mat-select>
              </mat-form-field>
              <mat-form-field class="example-full-width" appearance="fill">
                <mat-label>Line</mat-label>
                <mat-select formControlName="lineId">
                  <mat-option *ngFor="let option of linesOption" [value]="option.id">
                    {{option.name}}
                  </mat-option>
                </mat-select>
              </mat-form-field>
            </div>
            <div class="side">
              <mat-form-field class="example-full-width" appearance="fill">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description"></textarea>
              </mat-form-field>
              <mat-form-field class="example-full-width">
                <mat-label>Tags</mat-label>
                <mat-chip-grid #chipGrid aria-label="Fruit selection">
                  <mat-chip-row *ngFor="let tag of selectedTags" (removed)="removeTag(tag)">
                    {{tag.name}}
                    <button matChipRemove [attr.aria-label]="'remove ' + tag.name">
                      <mat-icon>cancel</mat-icon>
                    </button>
                  </mat-chip-row>
                </mat-chip-grid>
                <input placeholder="New Tag..." #tagInput
                       [formControl]="tagControl"
                       [matChipInputFor]="chipGrid"
                       [matAutocomplete]="auto"
                       [matChipInputSeparatorKeyCodes]="separatorKeysCodes">
                <mat-autocomplete #auto="matAutocomplete">
                  <mat-option *ngFor="let tag of filteredTags" [value]="tag">
                    {{tag.name}}
                  </mat-option>
                </mat-autocomplete>
              </mat-form-field>
              <mat-form-field class="example-full-width">
                <mat-label>Taste</mat-label>
                <mat-chip-grid #chipTasteGrid aria-label="Fruit selection">
                  <mat-chip-row *ngFor="let tag of selectedTasteTags" (removed)="removeTasteTag(tag)">
                    {{tag.name}}
                    <button matChipRemove [attr.aria-label]="'remove ' + tag.name">
                      <mat-icon>cancel</mat-icon>
                    </button>
                  </mat-chip-row>
                </mat-chip-grid>
                <input placeholder="New Tag..." #tagTasteInput
                       [formControl]="tagTasteControl"
                       [matChipInputFor]="chipTasteGrid"
                       [matAutocomplete]="autoTaste"
                       [matChipInputSeparatorKeyCodes]="separatorKeysCodes">
                <mat-autocomplete #autoTaste="matAutocomplete">
                  <mat-option *ngFor="let tag of filteredTasteTags" [value]="tag">
                    {{tag.name}}
                  </mat-option>
                </mat-autocomplete>
              </mat-form-field>
            </div>
          </div>
          <br>
        </div>
        @if(getTobaccos.controls.length > 1){
          <hr>
        }
      </div>
    </div>
  </form>
  <div class="popup-action-container">
    <button class="popup-btn create-btn-color" (click)="onSave()">Create</button>
<!--    <button class="popup-btn create-btn-color" (click)="OnOneMore()">One more</button>-->
    <button class="popup-btn cancel-btn-color" (click)="onCancel()">Cancel</button>
  </div>
</div>
