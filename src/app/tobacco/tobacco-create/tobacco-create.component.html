<div class="popup-container">
  <h1>Create Tobacco</h1>
  <form [formGroup]="createTobaccoForm" class="example-form">
    <div class="create-tobacco-container">
      <div class="side">
        <app-image-upload [aspectRatio]="aspectRatio" (fileName)="setName($event)"></app-image-upload>
      </div>
      <div class="side">
        <label class="ui-field">
          <span class="ui-label">Tobacco Name</span>
          <input class="ui-input" type="text" formControlName="name" (keyup)="onChange()">
        </label>
        <app-search-select
          label="Brand"
          placeholder="Search brand"
          [options]="allBrandsOption"
          [control]="brandIdControl"
          (valueSelected)="onBrandSelected($event)">
        </app-search-select>
        <app-search-select
          label="Heaviness"
          placeholder="Select heaviness"
          [options]="heaviness$ | async"
          [control]="heavinessIdControl">
        </app-search-select>
        <label class="ui-field">
          <span class="ui-label">Line</span>
          <select class="ui-select" formControlName="lineId">
            <option [ngValue]="null">Select line</option>
            <option *ngFor="let option of linesOption" [ngValue]="option.id">{{ option.name }}</option>
          </select>
        </label>
      </div>
      <div class="side">
        <label class="ui-field">
          <span class="ui-label">Description</span>
          <textarea class="ui-textarea" formControlName="description"></textarea>
        </label>
        <app-token-picker
          label="Tags"
          placeholder="Search tag..."
          [options]="allTags"
          [selected]="selectedTags"
          (selectedChange)="onTagsSelected($event)">
        </app-token-picker>
        <app-token-picker
          label="Taste"
          placeholder="Search taste..."
          [options]="allTasteTags"
          [selected]="selectedTasteTags"
          (selectedChange)="onTasteTagsSelected($event)">
        </app-token-picker>
      </div>
    </div>
  </form>
  <div class="popup-action-container">
    <button class="popup-btn create-btn-color" type="button" (click)="onSave()">Create</button>
    <button class="popup-btn create-btn-color" type="button" (click)="onSave(true)">Create more</button>
    <button class="popup-btn cancel-btn-color" type="button" (click)="onCancel()">Cancel</button>
  </div>
</div>
