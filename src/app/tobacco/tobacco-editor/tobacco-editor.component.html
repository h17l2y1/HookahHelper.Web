<div class="popup-container">
  <h1>Update Tobacco</h1>
  <form *ngIf="editTobaccoForm" [formGroup]="editTobaccoForm" class="example-form">
    <div class="create-tobacco-container">
      <div class="side">
        <app-image-upload [aspectRatio]="aspectRatio"></app-image-upload>
      </div>
      <div class="side">
        <label class="ui-field">
          <span class="ui-label">Tobacco Name</span>
          <input class="ui-input" type="text" formControlName="name" (keyup)="onChange()">
        </label>
        <label class="ui-field">
          <span class="ui-label">Brand</span>
          <input class="ui-input" type="text" disabled [value]="data.tobacco.brand.name">
        </label>
        <app-search-select
          label="Heaviness"
          placeholder="Select heaviness"
          [options]="heaviness$ | async"
          [control]="heavinessIdControl">
        </app-search-select>
        <label class="ui-field">
          <span class="ui-label">Lines</span>
          <select class="ui-select" formControlName="lineId">
            <option *ngFor="let item of linesOption$ | async" [ngValue]="item.id">{{ item.name }}</option>
          </select>
        </label>
      </div>
      <div class="side">
        <label class="ui-field">
          <span class="ui-label">Description</span>
          <textarea class="ui-textarea" formControlName="description"></textarea>
        </label>
        <app-token-picker
          label="Tags"
          placeholder="Search tag..."
          [options]="allTags"
          [selected]="selectedTags"
          (selectedChange)="onTagsSelected($event)">
        </app-token-picker>
        <app-token-picker
          label="Taste"
          placeholder="Search taste..."
          [options]="allTasteTags"
          [selected]="selectedTasteTags"
          (selectedChange)="onTasteTagsSelected($event)">
        </app-token-picker>
      </div>
    </div>
  </form>
  <div class="popup-action-container">
    <button class="popup-btn create-btn-color" type="button" (click)="onSave()">Update</button>
    <button class="popup-btn cancel-btn-color" type="button" (click)="onCancel()">Cancel</button>
  </div>
</div>
