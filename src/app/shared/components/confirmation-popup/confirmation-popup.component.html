<h1 mat-dialog-title>Підтвердження</h1>
<div class="remove-container">
  <div mat-dialog-content>Ви впевнені ?</div>
  <div mat-dialog-actions>
    <button mat-button mat-dialog-close class="remove-color" (click)="onAction(true)">Так</button>
    <button mat-button mat-dialog-close cdkFocusInitial class="cancel-color" (click)="onAction(false)">Hi</button>
  </div>
</div>
