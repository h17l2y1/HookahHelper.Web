<div class="remove-popup">
  <h1 mat-dialog-title>Confirmation</h1>
  <div class="remove-container">
    <div class="data-container">
      <div class="text-container">
        <div class="title">Are you sure ?</div>
        <div class="description">Are you sure you want to delete this item ? This action cannot be undone</div>
      </div>
    </div>
    <div mat-dialog-actions>
      <button mat-button class="popup-btn cancel-btn-color" (click)="onAction(false)">Cancel</button>
      <button mat-button class="popup-btn red-bck-color" (click)="onAction(true)">Delete</button>
    </div>
  </div>
</div>
