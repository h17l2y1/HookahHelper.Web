<h1 mat-dialog-title>Confirmation</h1>
<div class="remove-container">
  <div mat-dialog-content>Are you sure ?</div>
  <div mat-dialog-actions>
    <button mat-button mat-dialog-close class="remove-color" (click)="onAction(true)">Yes</button>
    <button mat-button mat-dialog-close class="cancel-color" (click)="onAction(false)">No</button>
  </div>
</div>
