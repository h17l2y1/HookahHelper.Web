<div class="confirm-shell">
  <div class="confirm-kicker">Warning</div>
  <h1 class="confirm-title">{{ title }}</h1>
  <p class="confirm-description">{{ description }}</p>

  <div class="confirm-card">
    <div class="confirm-icon" [class.danger]="confirmTone === 'danger'" [class.warning]="confirmTone === 'warning'">
      !
    </div>
    <div class="confirm-copy">
      <div class="confirm-copy-title">This action is permanent</div>
      <div class="confirm-copy-subtitle">Please double check before confirming.</div>
    </div>
  </div>

  <div class="confirm-actions">
    <button type="button" class="confirm-btn secondary" (click)="onCancel()">{{ cancelText }}</button>
    <button type="button" class="confirm-btn primary" [class.danger]="confirmTone === 'danger'" [class.warning]="confirmTone === 'warning'" (click)="onConfirm()">
      {{ confirmText }}
    </button>
  </div>
</div>
