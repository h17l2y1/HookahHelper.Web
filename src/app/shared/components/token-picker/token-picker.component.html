<div class="token-picker">
  <label class="token-picker-label">{{ label }}</label>
  <div class="token-picker-shell">
    <div class="token-list" *ngIf="(selected?.length ?? 0) > 0">
      <button
        type="button"
        class="token"
        *ngFor="let item of selected; trackBy: trackById"
        (click)="remove(item)">
        <span>{{ item.name }}</span>
        <span class="token-remove" aria-hidden="true">×</span>
      </button>
    </div>
    <div class="search-select-shell">
      <input
        class="search-select-input"
        type="text"
        [placeholder]="placeholder"
        [formControl]="searchControl"
        (focus)="openDropdown()"
        (blur)="closeDropdown()">
    </div>
    <div class="search-select-dropdown" *ngIf="isOpen && filteredOptions.length">
      <button
        type="button"
        class="search-select-option"
        *ngFor="let option of filteredOptions; trackBy: trackById"
        (mousedown)="$event.preventDefault()"
        (click)="add(option)">
        <span class="option-name">{{ option.name }}</span>
      </button>
    </div>
  </div>
</div>
