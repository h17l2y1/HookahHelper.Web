<label class="country-select">
  <span>Country</span>
  <input
    type="text"
    [formControl]="countryAutocompleteControl"
    list="country-options"
    placeholder="Select country">
  <datalist id="country-options">
    <option value="">Усi</option>
    @for (option of filteredCountriesOptions; track option.id) {
      <option [value]="option.name"></option>
    }
  </datalist>
</label>
