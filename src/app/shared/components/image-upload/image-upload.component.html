<div class="image-uploader-container">
  <div *ngIf="!currentImage; else elseBlock" class="image-zone">image-zone</div>
  <ng-template #elseBlock>
      <img [src]="currentImage" class="preview" alt="image error">
  </ng-template>
    <div>
      <input
        class="input-fix"
        type="file"
        id="fileInput"
        name="fileInput"
        accept="image/*"
        (change)="selectFiles($event)">
      <label for="fileInput">Choose file</label>
    </div>
</div>
